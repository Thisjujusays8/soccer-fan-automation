name: Post - Lamine Yamal

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: post-yamal
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: python -m pip install --upgrade yt-dlp

      - name: Run poster
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IG_USER_ID: ${{ secrets.YAMAL_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.YAMAL_IG_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
          PLAYER_SLUG: yamal
          SEARCH_QUERY: "Lamine Yamal highlights goals assists Barcelona 2025"
          WATERMARK_HANDLE: yamalworld
          MODE: auto
          AUTO_APPROVE: "false"
          POST_TO_IG: "true"
          POST_TO_TIKTOK: "true"
          MAX_RESULTS: "16"
          CLIP_SECONDS: "45"
        run: python scripts/post.py
